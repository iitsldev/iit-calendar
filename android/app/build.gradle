apply plugin: 'com.android.application'
// Apply the Google Services plugin cleanly at the top scope so it registers dependencies before evaluation
apply plugin: 'com.google.gms.google-services'

import groovy.json.JsonSlurper

def getAppVersion() {
    def jsonFile = file('../../package.json')
    if (jsonFile.exists()) {
        def parsedJson = new JsonSlurper().parseText(jsonFile.text)
        return parsedJson.version ?: "1.0.0"
    }
    return "1.0.0"
}

def getAppVersionCode(String versionStr) {
    try {
        def parts = versionStr.split('\\.')
        def major = parts[0].toInteger()
        def minor = parts[1].toInteger()
        def patch = parts[2].split('-')[0].toInteger()
        return major * 1000000 + minor * 1000 + patch
    } catch (Exception e) {
        return 1
    }
}

def appVersionName = getAppVersion()
def appVersionCode = getAppVersionCode(appVersionName)

android {
    namespace = "com.iitcalendar.applet"
    compileSdk = rootProject.ext.compileSdkVersion
    
    defaultConfig {
        applicationId "com.iitcalendar.applet"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode appVersionCode
        versionName appVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir {
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    
    // Import the Firebase BoM (Bill of Materials) for structured library versioning
    implementation(platform("com.google.firebase:firebase-bom:33.10.0"))
    
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"

    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    
    // Capacitor core modules
    implementation project(':capacitor-android')
    implementation project(':capacitor-app')
    implementation project(':capacitor-device')
    implementation project(':capacitor-haptics')
    implementation project(':capacitor-local-notifications')

    // Native Capacitor Firebase wrapper
}

apply from: 'capacitor.build.gradle'
