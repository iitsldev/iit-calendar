name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
      build_web:
        description: 'Build Web Zip'
        type: boolean
        default: true
      build_android:
        description: 'Build Android APK'
        type: boolean
        default: false
      build_desktop:
        description: 'Build Desktop Apps'
        type: boolean
        default: false

jobs:
  build-web:
    if: github.event_name == 'push' || github.event.inputs.build_web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Dependencies
        run: npm ci
      - name: Build Web
        run: npm run build
      - name: Zip Web Build
        run: cd dist && zip -r ../web-build.zip .
      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: web-build.zip

  build-android:
    if: github.event_name == 'push' || github.event.inputs.build_android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Install Dependencies
        run: npm ci
      - name: Build Web
        run: npm run build
      - name: Generate Icons
        run: node generate-icons.cjs
      - name: Sync Capacitor
        run: npx cap sync android
      - name: Build APK
        working-directory: android
        run: |
          rm -f gradle/wrapper/gradle-wrapper.jar
          gradle wrapper
          ./gradlew assembleDebug
      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  build-desktop:
    if: github.event_name == 'push' || github.event.inputs.build_desktop == 'true'
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - name: Install Dependencies
        run: npm ci
      - name: Build Frontend
        run: npm run build
      - name: Fix Tauri Icons
        run: node generate-icons.cjs
        shell: bash
      - name: Build Tauri
        run: |
          if [ "${{ matrix.os }}" == "macos-latest" ]; then
            npx @tauri-apps/cli build --target universal-apple-darwin
          else
            npx @tauri-apps/cli build
          fi
        shell: bash
      - name: Upload Mac Artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: mac-app
          path: src-tauri/target/**/release/bundle/dmg/*.dmg
      - name: Upload Windows Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: win-app
          path: src-tauri/target/release/bundle/nsis/*.exe

  create-release:
    needs: [build-web, build-android, build-desktop]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Web Artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: web-build
          path: dist-release
      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: android-apk
          path: dist-release
      - name: Download Mac Artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: mac-app
          path: dist-release
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: win-app
          path: dist-release
      - name: Set Release Version
        id: set_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          fi
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          files: |
            dist-release/**/*
